<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Per Andrea ❤️</title><style>body{margin:0;font-family:Georgia,serif;background:linear-gradient(#0b2d5d,#02111f);color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center}#card{max-width:760px;padding:30px}button{padding:16px 28px;font-size:20px;border:none;border-radius:14px;background:#d4af37;cursor:pointer}#message{display:none;margin-top:25px;font-size:22px;line-height:1.7}</style></head><body><div id="card"><h1>🏴‍☠️ Per Andrea ❤️</h1><p>Un piccolo tesoro ti aspetta...</p><button id="openBtn">📦 Apri il Forziere</button><audio id="bgmusic" preload="auto"><source src="music.mp3" type="audio/mpeg"></audio><div id="message"><h2>💎 Il mio tesoro sei tu 💎</h2><p>Ogni avventura è più bella quando la condivido con te.<br><br>Grazie per essere il mio porto sicuro, il mio sorriso e la persona con cui voglio continuare a navigare.<br><br>Ti amo con tutto il cuore. ❤️</p></div></div><script>const btn=document.getElementById('openBtn');const audio=document.getElementById('bgmusic');btn.addEventListener('click',async()=>{try{audio.load();await audio.play();}catch(e){console.log(e);}btn.style.display='none';document.getElementById('message').style.display='block';});</script></body></html>
